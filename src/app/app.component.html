<div class="app-shell">
  @if (selectedMode() === null) {
    <section class="landing-screen">
      <div class="landing-orb" aria-hidden="true"></div>

      <p class="eyebrow">Interactive Lab</p>
      <h1>MIDI Trainer</h1>
      <p class="description">Scegli come allenarti. I pulsanti grandi compaiono solo qui, all'inizio.</p>

      <div class="landing-actions" role="navigation" aria-label="Game mode selector">
        <button class="hero-mode" (click)="selectMode('play')">
          <span class="hero-icon" aria-hidden="true">&#127929;</span>
          <span class="hero-content">
            <span class="hero-title">Play Chord</span>
            <span class="hero-copy">Suona l'accordo richiesto sulla tastiera</span>
          </span>
          <span class="hero-tag">Ear</span>
        </button>

        <button class="hero-mode" (click)="selectMode('recognize')">
          <span class="hero-icon" aria-hidden="true">&#127911;</span>
          <span class="hero-content">
            <span class="hero-title">Recognize Chord</span>
            <span class="hero-copy">Guarda il voicing e indovina accordo e qualita</span>
          </span>
          <span class="hero-tag">Theory</span>
        </button>
      </div>
    </section>
  } @else {
    <header class="topbar" role="navigation" aria-label="Main menu">
      <div class="topbar-brand" aria-hidden="true">
        <span class="brand-badge">&#9836;</span>
      </div>

      <div class="topbar-actions">
        <button
          class="menu-link icon-link"
          [class.active]="selectedMode() === 'play'"
          (click)="selectMode('play')"
          aria-label="Play Chord"
          title="Play Chord">
          <span aria-hidden="true">&#127929;</span>
        </button>
        <button
          class="menu-link icon-link"
          [class.active]="selectedMode() === 'recognize'"
          (click)="selectMode('recognize')"
          aria-label="Recognize Chord"
          title="Recognize Chord">
          <span aria-hidden="true">&#127911;</span>
        </button>
        <button
          class="menu-link icon-link ghost"
          (click)="resetModeSelection()"
          aria-label="Torna all'inizio"
          title="Torna all'inizio">
          <span aria-hidden="true">&#127968;</span>
        </button>
      </div>
    </header>

    <main class="stage">
      @if (selectedMode() === 'play') {
        <app-play-chord></app-play-chord>
      } @else if (selectedMode() === 'recognize') {
        <app-recognize-chord></app-recognize-chord>
      }
    </main>
  }
</div>
